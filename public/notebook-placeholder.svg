<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg1" cx="72%" cy="28%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a4060"/>
      <stop offset="100%" stop-color="#080f1a"/>
    </radialGradient>
    <radialGradient id="bg2" cx="20%" cy="75%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a2840"/>
      <stop offset="100%" stop-color="#080f1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="140" fill="#090f1c"/>
  <rect width="400" height="140" fill="url(#bg1)"/>
  <rect width="400" height="140" fill="url(#bg2)"/>

  <!-- Connection lines -->
  <g stroke="#1e5080" stroke-width="0.8" fill="none" opacity="0.65">
    <path d="M 48,28 Q 100,15 170,62"/>
    <path d="M 170,62 Q 250,115 305,52"/>
    <path d="M 305,52 Q 355,25 392,78"/>
    <path d="M 170,62 Q 195,98 228,122"/>
    <path d="M 48,28 Q 75,78 98,112"/>
    <path d="M 305,52 Q 268,88 228,122"/>
    <path d="M 392,78 Q 380,110 355,128"/>
  </g>

  <!-- Distant tiny dots -->
  <g fill="#4dd0e1" opacity="0.35">
    <circle cx="22" cy="52" r="1"/>
    <circle cx="135" cy="12" r="1"/>
    <circle cx="260" cy="132" r="1"/>
    <circle cx="388" cy="30" r="1"/>
    <circle cx="372" cy="118" r="1.2"/>
    <circle cx="78" cy="135" r="1"/>
    <circle cx="345" cy="8" r="1"/>
    <circle cx="190" cy="130" r="0.8"/>
    <circle cx="310" cy="130" r="0.8"/>
  </g>

  <!-- Secondary nodes -->
  <g fill="#4dd0e1">
    <circle cx="98" cy="112" r="1.5" opacity="0.6"/>
    <circle cx="228" cy="122" r="1.5" opacity="0.55"/>
    <circle cx="355" cy="128" r="1.5" opacity="0.5"/>
  </g>

  <!-- Node: 48,28 -->
  <circle cx="48" cy="28" r="7" fill="#4dd0e1" opacity="0.06"/>
  <circle cx="48" cy="28" r="3.5" fill="#4dd0e1" opacity="0.2"/>
  <circle cx="48" cy="28" r="1.8" fill="#4dd0e1" opacity="0.85" filter="url(#glow)"/>

  <!-- Node: 305,52 -->
  <circle cx="305" cy="52" r="9" fill="#4dd0e1" opacity="0.07"/>
  <circle cx="305" cy="52" r="4.5" fill="#4dd0e1" opacity="0.18"/>
  <circle cx="305" cy="52" r="2" fill="#4dd0e1" opacity="0.9" filter="url(#glow)"/>

  <!-- Node: 392,78 (partial, edge) -->
  <circle cx="392" cy="78" r="7" fill="#4dd0e1" opacity="0.06"/>
  <circle cx="392" cy="78" r="3" fill="#4dd0e1" opacity="0.25"/>
  <circle cx="392" cy="78" r="1.5" fill="#4dd0e1" opacity="0.8"/>

  <!-- Node: 170,62 — main featured node -->
  <circle cx="170" cy="62" r="18" fill="#4dd0e1" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="170" cy="62" r="10" fill="#4dd0e1" opacity="0.07"/>
  <circle cx="170" cy="62" r="5" fill="#4dd0e1" opacity="0.18"/>
  <circle cx="170" cy="62" r="2.5" fill="#4dd0e1" opacity="0.7" filter="url(#glow)"/>
  <circle cx="170" cy="62" r="1.2" fill="#a7ecf5"/>
</svg>
